services:
  postgres:
    image: postgres:16
    container_name: construction-work-log-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: construction_work_log
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d construction_work_log']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: construction-work-log-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/construction_work_log?schema=public
      PORT: 3000
    ports:
      - '3000:3000'

  frontend:
    build:
      context: ./frontend
    container_name: construction-work-log-frontend
    depends_on:
      - backend
    ports:
      - '5173:80'

volumes:
  postgres_data:
